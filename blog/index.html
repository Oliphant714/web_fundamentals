<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A responsive book blog layout featuring Magyk by Angie Sage.">
  <title>Kids Read For Fun</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="page-shell">
    <header class="site-header">
      <h1>Kids Read For Fun</h1>
      <nav aria-label="Main navigation" class="site-nav">
        <a href="#">About</a>
        <a href="#">Archive</a>
        <a href="#">Search</a>
      </nav>
    </header>

    <main id="main-content" class="content-area">
      <article class="book-review" aria-labelledby="book-title">
        <section class="book-meta" aria-label="Book details">
          <p class="meta-date">July 5, 2022</p>
          <p class="meta-age">10-14</p>
          <p class="meta-genre">Fantasy</p>
          <p class="meta-rating" aria-label="4 out of 5 stars">★★★★☆</p>
        </section>

        <section class="book-main">
          <h2 id="book-title">Septimus Heap Book One: Magyk</h2>

          <figure class="book-cover">
            <img
              src="https://upload.wikimedia.org/wikipedia/en/5/5f/Magkycover2.jpg"
              alt="Cover of Septimus Heap Book One: Magyk by Angie Sage"
            >
          </figure>

          <p class="book-summary">
            If you enjoy stories about seventh sons of seventh sons and magyk this is the book for you.
          </p>
        </section>
      </article>
    </main>

    <footer class="site-footer">
      <p>Jane Doe</p>
    </footer>
  </div>
</body>
</html>
